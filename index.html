<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}
header{
padding:15px 6%;
display:flex;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}
.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
#domains{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.3s;
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00ffff;
}
.domain{
font-size:18px;
font-weight:600;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
text-align:center;
}
.big-domain{
font-size:clamp(28px,8vw,50px);
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
.actions{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}
input{
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}
.btn{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}
.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app">Loading...</div>

<script>

// 🔥 رابط Google Sheet مع منع الكاش
const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv";

const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

function fetchDomains(){
return fetch(BASE_URL + "&t=" + Date.now(), {cache:"no-store"})
.then(res=>res.text())
.then(text=>{
return text
.split(/\r?\n/)
.map(d=>d.trim())
.filter(d=>d && d.toLowerCase()!=="name");
});
}

function showHomepage(domains){
let html=`<div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+=`</div>`;
document.getElementById("app").innerHTML=html;
}

function showLanding(domain){
document.getElementById("app").innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>

<div class="actions">
<input id="offerPrice" placeholder="Enter offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>

<div style="margin-top:20px;cursor:pointer" onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

// 🔄 تحميل البيانات
function loadApp(){
fetchDomains().then(domains=>{
if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domains);
}
});
}

// تشغيل أول مرة
loadApp();

// 🔥 تحديث تلقائي كل 20 ثانية
setInterval(loadApp,20000);

</script>

</body>
</html>
