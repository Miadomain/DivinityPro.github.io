<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro Domains</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    #domains {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }
    .card {
        background: #fff;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        text-align: center;
        transition: transform 0.2s;
    }
    .card:hover {
        transform: translateY(-5px);
    }
    .domain {
        font-weight: bold;
        margin-bottom: 10px;
        color: #0070f3;
        word-wrap: break-word;
    }
    button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }
    button:hover {
        background-color: #218838;
    }
</style>
</head>
<body>

<h1>Available Domains for Sale</h1>
<div id="domains"></div>

<script>
let allDomains = [];

fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv')
.then(res => res.text())
.then(text => {
    let rows = text.split(/\r?\n/); // دعم أسطر مختلفة
    allDomains = rows
        .map(row => row.trim())
        .filter(row => row !== "" && row.toLowerCase() !== "name"); // حذف الفارغ والعنوان
    showDomains(allDomains);
});

function showDomains(domains) {
    let container = document.getElementById('domains');
    let html = '';

    domains.forEach(domain => {
        html += `
        <div class="card">
            <div class="domain">${domain}</div>
            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}" target="_blank">
                <button>Check & Buy</button>
            </a>
        </div>
        `;
    });

    container.innerHTML = html;
}
</script>

</body>
</html>
