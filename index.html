<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

/* BODY */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
padding:18px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#8a2eff,#00f0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#00f0ff;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

/* CONTACT */
.contact{
text-align:center;
padding:80px 20px;
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
display:inline-flex;
align-items:center;
gap:12px;
background:#25D366;
color:white;
padding:14px 26px;
border-radius:50px;
font-size:18px;
font-weight:600;
text-decoration:none;
box-shadow:0 0 15px rgba(37,211,102,0.6);
transition:0.3s;
}

.whatsapp-btn i{
font-size:24px;
}

.whatsapp-btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 0 25px rgba(37,211,102,0.9);
background:#1ebe5d;
}

/* FLOATING BUTTON */
.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:white;
text-decoration:none;
box-shadow:0 0 20px rgba(37,211,102,.8);
z-index:999;
animation:pulse 2s infinite;
transition:.3s;
}

.whatsapp-float:hover{
transform:scale(1.1);
background:#1ebe5d;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,.7);}
70%{box-shadow:0 0 0 20px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
opacity:.6;
}

</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>

<nav>
<a href="#">Home</a>
<a href="#">Domains</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Elite Premium Domains</h1>
<p>Discover powerful brandable domains for your next big project.</p>
</section>

<section id="contact" class="contact">
<h2>Contact Us</h2>
<p>Chat instantly with us via WhatsApp</p>

<br><br>

<a href="https://wa.me/218916073973" target="_blank" class="whatsapp-btn">
<i class="fab fa-whatsapp"></i>
Chat on WhatsApp
</a>

</section>

<!-- FLOATING WHATSAPP -->
<a href="https://wa.me/218916073973" target="_blank" class="whatsapp-float">
<i class="fab fa-whatsapp"></i>
</a>

<footer>
© 2026 DivinityPro — All Rights Reserved
</footer>

</body>
</html>
