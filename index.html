<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Domains</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

input {
    padding: 10px;
    width: 300px;
    border-radius: 10px;
    border: none;
    margin-bottom: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

.domain {
    font-size: 20px;
}

.price {
    color: #38bdf8;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<h1>🔥 My Domains For Sale</h1>

<input type="text" id="search" placeholder="Search domain...">

<div class="container" id="domains"></div>

<script>

let allDomains = [];

fetch('domains.json')
.then(res => res.json())
.then(data => {
    allDomains = data;
    showDomains(data);
});

function showDomains(domains) {
    let container = document.getElementById('domains');
    container.innerHTML = '';

    domains.forEach(d => {
        container.innerHTML += `
        <div class="card">
            <div class="domain">${d.name}</div>
            <div class="price">$${d.price}</div>
            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${d.name}" target="_blank">
                <button>Buy Now</button>
            </a>
        </div>
        `;
    });
}

document.getElementById('search').addEventListener('input', function() {
    let value = this.value.toLowerCase();
    let filtered = allDomains.filter(d => d.name.toLowerCase().includes(value));
    showDomains(filtered);
});

</script>

</body>
</html>
