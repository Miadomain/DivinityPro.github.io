<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Domains For Sale</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.domain {
    font-size: 20px;
    margin-bottom: 10px;
}

.price {
    color: #38bdf8;
    margin-bottom: 15px;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}
</style>

</head>

<body>

<h1>🔥 Premium Domains For Sale</h1>

<div class="container">

    <div class="card">
        <div class="domain">example1.com</div>
        <div class="price">$500</div>
        <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=example1.com" target="_blank">
            <button>Buy Now</button>
        </a>
    </div>

    <div class="card">
        <div class="domain">example2.com</div>
        <div class="price">$1200</div>
        <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=example2.com" target="_blank">
            <button>Buy Now</button>
        </a>
    </div>

</div>

</body>
</html>
