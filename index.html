<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
/* ====== (كل CSS الخاص بك بدون أي تغيير) ====== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}
/* باقي CSS كما هو تماما */
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<div class="floating-whatsapp" onclick="window.open('https://wa.me/218916073973?text=Hello!')">
<i class="fab fa-whatsapp"></i>
</div>

<script>
const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';
const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];
let viewerCounts={};

/* =========================
   NEW AUTO LOAD FUNCTION
========================= */
function loadDomains(){

fetch(sheetURL + "&t=" + new Date().getTime()) // منع الكاش
.then(res=>res.text())
.then(text=>{

let newDomains=text
.split(/\r?\n/)
.map(r=>r.trim())
.filter(r=>r!=="" && r.toLowerCase()!=="name");

/* تحديث فقط إذا حصل تغيير */
if(JSON.stringify(newDomains)!==JSON.stringify(domainsList)){

domainsList=newDomains;

domainsList.forEach(d=>{
if(!viewerCounts[d]){
viewerCounts[d]=Math.floor(Math.random()*10)+5;
}
});

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domainsList);
}
}
});
}

/* تحميل أول مرة */
loadDomains();

/* تحديث تلقائي كل 30 ثانية */
setInterval(loadDomains,30000);


/* =========================
   HOMEPAGE
========================= */
function showHomepage(domains){

let html=`
<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<div class="slide-content">
<h1>DivinityPro</h1>
<p>Where premium domains live</p>
</div></div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<div class="slide-content">
<h1>High Value Domains</h1>
<p>Secure deals via GoDaddy</p>
</div></div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518779578993-ec3579fee39f')">
<div class="slide-content">
<h1>Brand Power</h1>
<p>Get your perfect domain today</p>
</div></div>

<div class="dots"></div>
</div>

<div class="domain-slider">
<div class="domain-track">`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="window.location='?domain=${d}'">${d}</div>`;
});

html+=`</div></div><div id="domains">`;

domains.forEach(d=>{
html+=`<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});

html+=`</div>`;

document.getElementById('app').innerHTML=html;
initSlider();
fakeActivity(domains);
}

/* =========================
   LANDING
========================= */
function showLanding(domain){
document.getElementById('app').innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>
<div class="actions">
<input id="offerPrice" placeholder="Enter offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>
<div class="back" onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

/* =========================
   SLIDER
========================= */
function initSlider(){
const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');
let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');
dot.onclick=()=>{index=i;showSlide(index);};
dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));
slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);
}

/* =========================
   FAKE ACTIVITY
========================= */
function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
let popup=document.getElementById('popup');
popup.innerText=`Someone made offer on ${d}`;
popup.style.display='block';
setTimeout(()=>{popup.style.display='none';},3000);
},5000);
}
</script>

<footer>
<div class="logo-footer">DivinityPro</div>
<div class="contact-info">
<div><i class="fas fa-envelope"></i> contact@divinitypro.com</div>
<div><i class="fas fa-phone"></i> +218 916 073 973</div>
<div><i class="fas fa-globe"></i> www.divinitypro.com</div>
</div>
</footer>

</body>
</html>
