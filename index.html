<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px; /* space for footer رقيق */
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
justify-content:flex-start;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:relative;
z-index:999;
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
animation:glowMove 5s linear infinite;
}

@keyframes glowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* BODY CONTAINER */
#app{padding-top:20px;}

/* SLIDER الكبير */
.slider{
position:relative;
height:340px;
overflow:hidden;
margin:20px auto;
border-radius:18px;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
background-size:cover;
background-position:center;
border-radius:18px;
}

.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.4),#000);
top:0;
left:0;
border-radius:18px;
}

.slide-content{
position:relative;
z-index:2;
}

.slide.active{opacity:1;}

.slide h1{
font-size:34px;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px rgba(0,255,255,.5);
}

.slide p{opacity:.8;}

.dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:12px;
height:12px;
background:#444;
border-radius:50%;
cursor:pointer;
transition:.3s;
}

.dot.active{
background:#00f0ff;
box-shadow:0 0 10px #00f0ff;
}

/* سلايدر صغير دومينات متحرك سلس */
.domain-slider{
width:90%;
margin:20px auto;
overflow:hidden;
position:relative;
height:50px; /* تم تصغيره */
border-radius:25px;
border:2px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.3);
}

.domain-track{
display:flex;
gap:15px;
animation:slideDomains 30s linear infinite;
}

.domain-bubble{
padding:8px 18px;
border-radius:50px;
background:linear-gradient(135deg,#ff6ec4,#7873f5,#00ffff);
color:white;
font-weight:600;
white-space:nowrap;
cursor:pointer;
transition:.3s, box-shadow 0.5s;
flex-shrink:0;
animation:neonGlow 3s linear infinite alternate;
font-size:14px;
}

.domain-bubble:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff00ff,0 0 30px #00ffff,0 0 40px #ff6ec4;
}

@keyframes slideDomains{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

@keyframes neonGlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GRID */
#domains{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.35s, box-shadow 0.5s;
backdrop-filter:blur(10px);
position:relative;
border:2px solid rgba(0,240,255,0.2);
animation:neonGlow 4s linear infinite alternate;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 0 25px #ff00ff,0 0 35px #00ffff,0 0 40px #ff6ec4;
border:2px solid #00f0ff;
}

.domain{
font-size:18px;
font-weight:600;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 12px rgba(255,0,255,.5);
}

.viewer-counter{
font-size:12px;
margin-top:6px;
opacity:.8;
}

/* LANDING */
.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:clamp(28px,8vw,50px);
word-break:break-word;
line-height:1.2;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px rgba(0,255,255,.5);
}

.actions{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

input{
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.btn{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

.back{
margin-top:20px;
cursor:pointer;
opacity:.8;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.8);
padding:15px 20px;
border-radius:12px;
font-size:14px;
display:none;
border:1px solid rgba(0,240,255,0.3);
box-shadow:0 0 15px rgba(0,240,255,0.2);
}

/* WhatsApp floating */
.floating-whatsapp{
position:fixed;
bottom:100px;
right:25px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
cursor:pointer;
z-index:9999;
transition:.3s;
}

.floating-whatsapp:hover{
transform:scale(1.1);
box-shadow:0 0 25px #25D366;
}

.floating-whatsapp i{
font-size:28px;
color:white;
}

/* FOOTER رقيق */
footer{
position:fixed;
bottom:0;
width:100%;
padding:10px 6%; /* رقيق */
display:flex;
justify-content:center;
align-items:flex-start;
flex-direction:column;
border-top:1px solid rgba(0,240,255,0.3);
color:white;
z-index:999;
font-size:12px;
background:linear-gradient(-45deg,#ff6ec4,#7873f5,#00ffff,#ff6ec4);
background-size:400% 400%;
animation:neonFooter 10s ease infinite;
backdrop-filter:blur(10px);
border-radius:12px 12px 0 0;
text-align:center;
}

@keyframes neonFooter{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

footer .logo-footer{
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
animation:glowMove 5s linear infinite;
margin-bottom:5px;
}

footer .contact-info{
display:flex;
flex-direction:column;
gap:3px;
align-items:center;
flex-wrap:wrap;
}

footer .contact-info div{
display:flex;
align-items:center;
gap:5px;
color:white;
justify-content:center;
}

footer .contact-info i{width:18px;}
</style>
</head>
<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<!-- WhatsApp floating -->
<div class="floating-whatsapp" onclick="window.open('https://wa.me/218916073973?text=Hello!')">
<i class="fab fa-whatsapp"></i>
</div>

<script>
const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';
const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];
let viewerCounts={};

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
domainsList=text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r!=="" && r.toLowerCase()!=="name");
domainsList.forEach(d=>viewerCounts[d]=Math.floor(Math.random()*10)+5);

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domainsList);
fakeActivity(domainsList);
}
});

function showHomepage(domains){
let html=`
<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<div class="slide-content">
<h1>Elite Domain Market</h1>
<p>Luxury digital assets for serious investors</p>
</div></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<div class="slide-content">
<h1>High Value Domains</h1>
<p>Secure deals via GoDaddy</p>
</div></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518779578993-ec3579fee39f')">
<div class="slide-content">
<h1>Domainer Empire</h1>
<p>Own the internet</p>
</div></div>
<div class="dots"></div>
</div>

<div class="domain-slider">
<div class="domain-track">`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="window.location='?domain=${d}'">${d}</div>`;
});

html+=`</div></div>

<div id="domains">`;

domains.forEach(d=>{
html+=`<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});

html+=`</div>`;

document.getElementById('app').innerHTML=html;
initSlider();
}

function showLanding(domain){
document.getElementById('app').innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>
<div class="actions">
<input id="offerPrice" placeholder="Enter offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>
<div class="back" onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');
let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');
dot.onclick=()=>{index=i;showSlide(index);};
dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));
slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);
}

function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
let popup=document.getElementById('popup');
popup.innerText=`Someone made offer on ${d}`;
popup.style.display='block';
setTimeout(()=>{popup.style.display='none';},3000);
},5000);
}
</script>

<footer>
<div class="logo-footer">DivinityPro</div>
<div class="contact-info">
<div><i class="fas fa-envelope"></i> contact@divinitypro.com</div>
<div><i class="fas fa-phone"></i> +218 916 073 973</div>
<div><i class="fas fa-globe"></i> www.divinitypro.com</div>
</div>
</footer>

</body>
</html>
