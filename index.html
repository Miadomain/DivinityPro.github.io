<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0d001a,#1a002e);
color:white;
overflow-x:hidden;
padding-bottom:120px;
transition:all 0.5s ease;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
justify-content:flex-start;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}
.logo{
font-size:26px;
font-weight:800;
background:linear-gradient(90deg,#ffd700,#00ffff,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 12px #ffd700,0 0 20px #00ffff;
animation:logoShine 4s infinite linear;
}
@keyframes logoShine{
0%,100%{background-position:0% 50%;}
50%{background-position:100% 50%;}
}

/* SLIDER */
.slider{
position:relative;
height:340px;
overflow:hidden;
margin:20px;
border-radius:20px;
box-shadow:0 0 25px #00ffff55 inset,0 0 35px #ff6ec499 inset;
}
.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
border-radius:20px;
animation:slideGlow 12s infinite alternate;
}
.slide.active{opacity:1;}
.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.2),#0d001a);
border-radius:20px;
}
@keyframes slideGlow{
0%,100%{filter:brightness(1);}
50%{filter:brightness(1.25);}
}

/* DOMAIN SCROLL */
.domain-slider{
width:92%;
margin:20px auto;
overflow:hidden;
border-radius:35px;
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 20px #00ffff55;
}
.domain-track{
display:flex;
gap:18px;
animation:scroll 28s linear infinite;
}
.domain-bubble{
padding:10px 18px;
background:linear-gradient(135deg,#ffd700,#00ffff,#ff6ec4);
border-radius:25px;
cursor:pointer;
white-space:nowrap;
color:#1a001a;
font-weight:600;
box-shadow:0 0 12px #ffd700aa,0 0 15px #00ffffaa;
transition:.5s;
}
.domain-bubble:hover{
transform:scale(1.12);
box-shadow:0 0 25px #ffd700ff,0 0 25px #00ffffff;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
#domains{
width:92%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:22px;
}
.card{
background:rgba(255,255,255,0.05);
padding:22px;
border-radius:18px;
cursor:pointer;
text-align:center;
transition:.4s;
box-shadow:0 0 12px #ff6ec455,0 0 15px #00ffff44;
}
.card:hover{
transform:scale(1.06);
box-shadow:0 0 28px #ff6ec499,0 0 28px #00ffff99;
}

.domain{
background:linear-gradient(90deg,#ffd700,#00ffff,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 8px #ffd700,0 0 12px #00ffff;
animation:shineText 3s infinite alternate;
}
@keyframes shineText{
0%{text-shadow:0 0 6px #ffd700,0 0 10px #00ffff;}
50%{text-shadow:0 0 10px #ffd700,0 0 15px #00ffff;}
100%{text-shadow:0 0 6px #ffd700,0 0 10px #00ffff;}
}

/* LANDING */
.landing{
text-align:center;
padding:50px 20px;
}
.big-domain{
font-size:44px;
background:linear-gradient(90deg,#ffd700,#00ffff,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 12px #ffd700,0 0 20px #00ffff;
animation:shineText 3s infinite alternate;
}

.btn{
padding:12px 20px;
border:none;
border-radius:12px;
margin:6px;
cursor:pointer;
font-weight:600;
box-shadow:0 0 10px #ffd70066,0 0 10px #00ffff44;
transition:.4s;
}
.buy{background:#ffd700;color:#1a001a;}
.offer{background:#00ffff;color:#1a001a;}
.whatsapp{background:#ff6ec4;color:#fff;}
.btn:hover{
transform:scale(1.08);
box-shadow:0 0 28px #ffd700,0 0 28px #00ffff;
}

/* FLOAT WHATSAPP */
.float-wa{
position:fixed;
bottom:90px;
right:20px;
width:60px;
height:60px;
background:#ff6ec4;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:26px;
color:#fff;
box-shadow:0 0 15px #ff6ec4aa,0 0 20px #ffd700aa;
transition:.4s;
}
.float-wa:hover{
transform:scale(1.15);
box-shadow:0 0 35px #ff6ec4ff,0 0 35px #ffd700ff;
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(-45deg,#ffd700,#00ffff,#ff6ec4,#ffd700);
background-size:400% 400%;
animation:grad 12s ease infinite;
padding:12px;
text-align:center;
font-size:13px;
color:#1a001a;
text-shadow:0 0 6px #ffd700,0 0 6px #00ffff;
}
@keyframes grad{
0%{background-position:0%}
100%{background-position:400%}
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app">Loading...</div>

<div class="float-wa" onclick="window.open('https://wa.me/218916073973')">
<i class="fab fa-whatsapp"></i>
</div>

<footer>
contact@divinitypro.com | +218 916 073 973
</footer>

<script>

const BASE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv";

let domains=[];

function loadDomains(){

fetch(BASE_URL + "&t=" + Date.now(), {cache:"no-store"})
.then(res=>res.text())
.then(text=>{

domains=text.split(/\n/)
.map(x=>x.trim())
.filter(x=>x && x.toLowerCase()!=="name");

const params=new URLSearchParams(window.location.search);
const d=params.get("domain");

if(d){
showLanding(d);
}else{
showHome();
}

});

}

function showHome(){

let html=`

<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')"></div>
</div>

<div class="domain-slider">
<div class="domain-track">
`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="go('${d}')">${d}</div>`;
});

html+=`</div></div><div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="go('${d}')">
<div class="domain">${d}</div>
</div>
`;
});

html+=`</div>`;

document.getElementById("app").innerHTML=html;

initSlider();
}

function showLanding(d){
document.getElementById("app").innerHTML=`
<div class="landing">
<div class="big-domain">${d}</div>

<input id="price" placeholder="Offer $" />

<br>

<button class="btn offer" onclick="offer('${d}')">Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${d}')">Buy</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/218916073973?text=I want ${d}')">WhatsApp</button>

<br><br>
<button onclick="goHome()">Back</button>
</div>
`;
}

function go(d){
history.pushState({}, "", "?domain="+d);
loadDomains();
}

function goHome(){
history.pushState({}, "", "/");
loadDomains();
}

function offer(d){
let p=document.getElementById("price").value;
if(!p){alert("Enter price");return;}
window.open(`https://wa.me/218916073973?text=Offer ${d} $${p}`);
}

function initSlider(){
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);
}

// init
loadDomains();
setInterval(loadDomains,20000);

</script>

</body>
</html>
