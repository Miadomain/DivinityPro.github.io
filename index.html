<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Premium Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
padding:15px 5%;
background:linear-gradient(90deg,#0d6efd,#6610f2);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
-webkit-background-clip:text;
color:transparent;
animation:shine 3s infinite linear;
}

@keyframes shine{
0%{background-position:-200px;}
100%{background-position:200px;}
}

/* SLIDER */

.slider{
position:relative;
height:320px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
background-size:cover;
background-position:center;
}

.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
top:0;
left:0;
}

.slide-content{
position:relative;
z-index:2;
}

.slide.active{opacity:1;}

.slide h1{
color:#ffc107;
text-shadow:0 0 20px rgba(255,193,7,.7);
}

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:10px;
height:10px;
background:#777;
border-radius:50%;
cursor:pointer;
}

.dot.active{background:#ffc107;}

/* GRID */

#domains{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:#151515;
padding:25px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.35s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 40px rgba(255,215,0,.4);
}

.domain{
color:#ffc107;
font-size:20px;
font-weight:700;
}

/* LANDING */

.landing{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:45px;
color:#ffc107;
}

.viewer{
color:#ff4d4d;
margin-top:10px;
}

/* ACTIONS */

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.buy{background:#28a745;color:white;}
.offer{background:#ffc107;color:black;}
.whatsapp{background:#25D366;color:white;}

/* ABOUT */

.about{
padding:50px 10%;
background:#111;
text-align:center;
}

.about h2{color:#ffc107;}

.contact{
margin-top:20px;
opacity:.8;
}

/* POPUP */

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#222;
padding:15px;
border-radius:10px;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<script>

const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';

const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{

let domains=text.split(/\r?\n/)
.map(r=>r.trim())
.filter(r=>r!=="" && r.toLowerCase()!=="name");

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domains);
fakeActivity(domains);
}

});

/* HOMEPAGE */

function showHomepage(domains){

let html=`

<div class="slider">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b')">
<div class="slide-content">
<h1>Premium Domain Investors</h1>
<p>Elite digital assets marketplace</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c')">
<div class="slide-content">
<h1>Secure & Trusted</h1>
<p>Transactions powered by GoDaddy</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')">
<div class="slide-content">
<h1>Domainer Empire</h1>
<p>High-value brandable domains</p>
</div>
</div>

<div class="dots"></div>

</div>

<div id="domains">
`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+=`</div>

<div class="about">
<h2>About DivinityPro</h2>
<p>We help investors acquire premium domain names with high resale value.</p>

<div class="contact">
📧 Email: contact.divinitypro.com <br>
📞 Phone: 00218916073973
</div>
</div>
`;

document.getElementById('app').innerHTML=html;

initSlider();
}

/* LANDING */

function showLanding(domain){

let viewers=Math.floor(Math.random()*10)+5;

document.getElementById('app').innerHTML=`

<div class="landing">

<div class="big-domain">${domain}</div>

<div class="viewer">🔥 ${viewers} investors viewing now</div>

<div class="actions">

<input id="offerPrice" placeholder="Enter your offer $" />

<button class="btn offer" onclick="sendOffer('${domain}')">
Make Offer
</button>

<button class="btn buy"
onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">
Buy Now
</button>

<button class="btn whatsapp"
onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">
Chat
</button>

</div>

<div style="margin-top:20px;cursor:pointer" onclick="window.location='/'">
← Back
</div>

</div>
`;
}

/* SEND OFFER TO WHATSAPP */

function sendOffer(domain){

let price=document.getElementById('offerPrice').value;

if(!price){
alert("Enter your offer first");
return;
}

let message = `Hello, I want to buy ${domain}%0A💰 Offer: $${price}%0AIs it still available?`;

window.open(`https://wa.me/${WHATSAPP}?text=${message}`);

}

/* SLIDER */

function initSlider(){

const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');
let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');

dot.onclick=()=>{
index=i;
showSlide(index);
};

dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));
slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);
}

/* FAKE ACTIVITY */

function fakeActivity(domains){

setInterval(()=>{
let randomDomain=domains[Math.floor(Math.random()*domains.length)];

let popup=document.getElementById('popup');
popup.innerText=`Someone just made an offer on ${randomDomain}`;
popup.style.display='block';

setTimeout(()=>{
popup.style.display='none';
},3000);

},5000);
}

</script>

</body>
</html>
