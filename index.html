<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Billion Dollar Brand</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#000;
color:white;
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at center,#0a0f2c,#000);
}

.hero h1{
font-size:60px;
font-weight:900;
background:linear-gradient(90deg,#00f0ff,#8a2eff,#00f0ff);
-webkit-background-clip:text;
color:transparent;
animation:shine 6s linear infinite;
}

.hero p{
opacity:.7;
max-width:600px;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

.cta{
margin-top:20px;
padding:14px 30px;
border-radius:12px;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
border:none;
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 0 20px rgba(0,240,255,.4);
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
background:#050505;
}

.stat{
text-align:center;
}

.stat h2{
color:#00f0ff;
font-size:28px;
}

.stat p{opacity:.6}

/* GRID */
#domains{
width:90%;
margin:50px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,240,255,.3);
}

.domain{
font-size:20px;
font-weight:600;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

/* TRUST */
.trust{
text-align:center;
padding:50px 10%;
border-top:1px solid rgba(255,255,255,0.05);
}

.logos{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:20px;
}

.logos img{
height:30px;
filter:grayscale(1) brightness(1.5);
opacity:.7;
transition:.3s;
}

.logos img:hover{
filter:none;
opacity:1;
transform:scale(1.1);
}

/* FOOTER CTA */
.footer{
text-align:center;
padding:60px 20px;
background:#050505;
}

.footer h2{
font-size:32px;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

</style>
</head>

<body>

<div class="hero">
<h1>Billion Dollar Domains</h1>
<p>We own digital assets that shape the future of the internet. Premium domains. Serious investors only.</p>
<button class="cta" onclick="document.getElementById('domains').scrollIntoView({behavior:'smooth'})">Explore Domains</button>
</div>

<div class="stats">
<div class="stat"><h2>$2M+</h2><p>Portfolio Value</p></div>
<div class="stat"><h2>500+</h2><p>Premium Domains</p></div>
<div class="stat"><h2>Global</h2><p>Investors</p></div>
</div>

<div id="domains"></div>

<div class="trust">
<h3>Trusted & Verified Platforms</h3>
<div class="logos">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/71/GoDaddy_logo_2018.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Sedo_logo.svg">
<img src="https://www.afternic.com/assets/images/logo-afternic.svg">
<img src="https://www.atom.com/logo.svg">
</div>
</div>

<div class="footer">
<h2>Own The Internet Before Others Do</h2>
</div>

<script>

const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
let domains=text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r!=="" && r.toLowerCase()!=="name");
let html="";

domains.forEach(d=>{
html+=`<div class="card" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${d}')">
<div class="domain">${d}</div>
</div>`;
});

document.getElementById('domains').innerHTML=html;
});

</script>

</body>
</html>
