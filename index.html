<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Premium Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
padding:15px 5%;
background:linear-gradient(90deg,#0d6efd,#6610f2);
font-weight:700;
}

/* GRID */
#domains{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:#151515;
padding:25px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.35s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 40px rgba(255,215,0,.4);
}

.domain{
color:#ffc107;
font-size:20px;
font-weight:700;
}

/* LANDING PAGE */

.landing{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
text-align:center;
flex-direction:column;
background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72?auto=format&fit=crop&w=1600&q=80')
center/cover;
}

.big-domain{
font-size:48px;
color:#ffc107;
margin-bottom:15px;
}

.tag{
opacity:.8;
margin-bottom:25px;
}

.buy{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#28a745,#20c997);
color:white;
cursor:pointer;
transition:.3s;
}

.buy:hover{
transform:scale(1.1);
}

.back{
margin-top:25px;
opacity:.7;
cursor:pointer;
}

@media(max-width:768px){
.big-domain{font-size:30px;}
}

</style>
</head>

<body>

<header>DivinityPro Premium Domains</header>

<div id="app"></div>

<script>

const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

/* LOAD DOMAINS */

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{

let domains=text.split(/\r?\n/)
.map(r=>r.trim())
.filter(r=>r!=="" && r.toLowerCase()!=="name");

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domains);
}

});

/* HOMEPAGE */

function showHomepage(domains){

let html='<div id="domains">';

domains.forEach(d=>{
html+=`
<div class="card"
onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+='</div>';

document.getElementById('app').innerHTML=html;
}

/* LANDING PAGE */

function showLanding(domain){

document.title=domain+" | DivinityPro";

document.getElementById('app').innerHTML=`

<div class="landing">

<div class="big-domain">${domain}</div>

<div class="tag">
Premium Brandable Domain Name
</div>

<button class="buy"
onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}','_blank')">

<i class="fa-solid fa-cart-shopping"></i>
 Buy Securely on GoDaddy

</button>

<div class="back" onclick="window.location='/'">
← Back to marketplace
</div>

</div>

`;
}

</script>

</body>
</html>
