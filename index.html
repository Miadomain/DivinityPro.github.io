<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:999;
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

/* SLIDER */
.slider{position:relative;height:340px;overflow:hidden;margin:20px auto;border-radius:18px;}
.slide{
position:absolute;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;
opacity:0;transition:1s;
background-size:cover;background-position:center;
}
.slide.active{opacity:1;}

.slide h1{
font-size:34px;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
-webkit-background-clip:text;color:transparent;
}

/* GRID */
#domains{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;border-radius:18px;text-align:center;
cursor:pointer;transition:.35s;
border:2px solid rgba(0,240,255,0.2);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #00ffff55;
}

.domain{
font-size:18px;font-weight:600;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;color:transparent;
}

.viewer-counter{font-size:12px;margin-top:6px;opacity:.8;}

.landing{
display:flex;justify-content:center;align-items:center;
height:70vh;flex-direction:column;text-align:center;
}

.big-domain{
font-size:clamp(28px,8vw,50px);
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;color:transparent;
}

input{
padding:12px;border-radius:10px;border:none;
background:#111;color:white;
}

.btn{
padding:12px 22px;border:none;border-radius:12px;
cursor:pointer;font-weight:600;
}

.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

footer{
position:fixed;
bottom:0;width:100%;
padding:10px;text-align:center;
background:#000;
border-top:1px solid rgba(0,240,255,0.3);
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>

<!-- WhatsApp floating -->
<div style="position:fixed;bottom:100px;right:25px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;z-index:9999;"
onclick="window.open('https://wa.me/218916073973?text=Hello!')">
<i class="fab fa-whatsapp" style="font-size:28px;color:white;"></i>
</div>

<script>

/* ======================
   GOOGLE SHEETS FIXED
====================== */

const sheetURL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv&t=' + Date.now();

const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];
let viewerCounts={};

fetch(sheetURL,{cache:"no-store"})
.then(res=>res.text())
.then(text=>{

domainsList = text
.split("\n")
.map(r=>r.split(",")[0].trim())
.filter(r=>r && r.toLowerCase()!=="name");

domainsList.forEach(d=>viewerCounts[d]=Math.floor(Math.random()*10)+5);

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domainsList);
initSlider();
}
});

/* ====================== */

function showHomepage(domains){

let html=`
<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<h1>DivinityPro</h1>
<p>Where premium domains live</p>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<h1>High Value Domains</h1>
<p>Secure deals via GoDaddy</p>
</div>
</div>

<div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});

html+=`</div>`;

document.getElementById('app').innerHTML=html;
}

function showLanding(domain){
document.getElementById('app').innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>

<input id="offerPrice" placeholder="Enter offer $" />

<div style="margin-top:20px">
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>

<div style="margin-top:20px;cursor:pointer"
onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
let index=0;
setInterval(()=>{
slides.forEach(s=>s.classList.remove('active'));
index=(index+1)%slides.length;
slides[index].classList.add('active');
},4000);
}

</script>

<footer>
DivinityPro — Premium Domains Marketplace
</footer>

</body>
</html>
