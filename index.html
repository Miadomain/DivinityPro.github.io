<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Premium Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
padding:15px 5%;
background:linear-gradient(90deg,#0d6efd,#6610f2);
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGO GOLD */

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
-webkit-background-clip:text;
color:transparent;
animation:shine 3s infinite linear;
}

@keyframes shine{
0%{background-position:-200px;}
100%{background-position:200px;}
}

/* SLIDER */

.slider{
position:relative;
height:300px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
}

.slide.active{opacity:1;}

.slide h1{
color:#ffc107;
}

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:10px;
height:10px;
background:#777;
border-radius:50%;
cursor:pointer;
}

.dot.active{background:#ffc107;}

/* GRID */

#domains{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:#151515;
padding:25px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.35s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 40px rgba(255,215,0,.4);
}

.domain{
color:#ffc107;
font-size:20px;
font-weight:700;
}

/* LANDING */

.landing{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:45px;
color:#ffc107;
}

.buy{
padding:15px 35px;
margin-top:20px;
border:none;
border-radius:10px;
background:#28a745;
color:white;
cursor:pointer;
}

.viewer{
margin-top:10px;
color:#ff4d4d;
}

/* ABOUT */

.about{
padding:50px 10%;
background:#111;
text-align:center;
}

.about h2{color:#ffc107;}

.contact{
margin-top:20px;
opacity:.8;
}

/* POPUP */

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#222;
padding:15px;
border-radius:10px;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>

<div class="popup" id="popup"></div>

<script>

const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{

let domains=text.split(/\r?\n/)
.map(r=>r.trim())
.filter(r=>r!=="" && r.toLowerCase()!=="name");

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domains);
fakeActivity(domains);
}

});

/* HOMEPAGE */

function showHomepage(domains){

let html=`

<div class="slider">

<div class="slide active">
<h1>Premium Domains Marketplace</h1>
<p>Hand-picked domains for investors & brands</p>
</div>

<div class="slide">
<h1>Trusted & Secure</h1>
<p>All purchases handled via GoDaddy</p>
</div>

<div class="slide">
<h1>Level Domainer Expert</h1>
<p>Advanced domain flipping & branding strategies</p>
</div>

<div class="dots"></div>

</div>

<div id="domains">
`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+=`</div>

<div class="about">
<h2>About Us</h2>
<p>DivinityPro is a premium domain marketplace helping investors acquire high-value brandable domains.</p>

<div class="contact">
📧 Email: your@email.com <br>
📞 Phone: +218XXXXXXXX
</div>
</div>
`;

document.getElementById('app').innerHTML=html;

initSlider();
}

/* LANDING */

function showLanding(domain){

let viewers=Math.floor(Math.random()*8)+3;

document.getElementById('app').innerHTML=`

<div class="landing">

<div class="big-domain">${domain}</div>

<div class="viewer">🔥 ${viewers} people viewing now</div>

<button class="buy"
onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">
Buy on GoDaddy
</button>

<div style="margin-top:20px;cursor:pointer" onclick="window.location='/'">
← Back
</div>

</div>
`;
}

/* SLIDER */

function initSlider(){

const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');

let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');

dot.onclick=()=>{
index=i;
showSlide(index);
};

dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));

slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);

}

/* FAKE ACTIVITY */

function fakeActivity(domains){

setInterval(()=>{

let randomDomain=domains[Math.floor(Math.random()*domains.length)];

let popup=document.getElementById('popup');
popup.innerText=`Someone just viewed ${randomDomain}`;
popup.style.display='block';

setTimeout(()=>{
popup.style.display='none';
},3000);

},6000);

}

</script>

</body>
</html>
