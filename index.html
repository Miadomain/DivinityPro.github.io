<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */
#domains{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid rgba(0,240,255,0.2);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00ffff55;
}

.domain{
font-size:18px;
font-weight:600;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

.viewer-counter{
font-size:12px;
opacity:.8;
margin-top:6px;
}

.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:clamp(28px,8vw,50px);
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
font-weight:600;
}

.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

input{
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

footer{
position:fixed;
bottom:0;
width:100%;
padding:10px;
text-align:center;
background:#000;
border-top:1px solid #00ffff44;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app">Loading domains...</div>

<script>
/* ===============================
   GOOGLE SHEET LIVE CONNECTION
================================= */

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv";

const WHATSAPP="218916073973";

/* منع الكاش ← أهم خطوة */
const LIVE_URL = SHEET_URL + "&t=" + new Date().getTime();

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let viewerCounts={};

/* قراءة Google Sheet */
async function loadDomains(){

try{

const res = await fetch(LIVE_URL,{cache:"no-store"});
const text = await res.text();

/* CSV parser ذكي */
const rows = text.split("\n")
.map(r=>r.split(",")[0].trim())
.filter(r=>r && r.toLowerCase()!=="name");

rows.forEach(d=>{
viewerCounts[d]=Math.floor(Math.random()*10)+5;
});

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(rows);
}

}catch(e){
document.getElementById("app").innerHTML="Failed to load domains.";
console.error(e);
}

}

loadDomains();

/* ===============================
   HOMEPAGE
================================= */

function showHomepage(domains){

let html=`<div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="openDomain('${d}')">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});

html+=`</div>`;

document.getElementById("app").innerHTML=html;
}

/* ===============================
   LANDING PAGE
================================= */

function openDomain(domain){
window.location='?domain='+domain;
}

function showLanding(domain){

document.getElementById('app').innerHTML=`
<div class="landing">

<div class="big-domain">${domain}</div>

<input id="offerPrice" placeholder="Enter offer $" />

<div>
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>

<button class="btn buy"
onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">
Buy Now
</button>

<button class="btn whatsapp"
onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">
Chat
</button>
</div>

<div style="margin-top:20px;cursor:pointer"
onclick="window.location='/'">← Back</div>

</div>`;
}

/* ===============================
   OFFER
================================= */

function sendOffer(domain){

let price=document.getElementById('offerPrice').value;

if(!price){
alert("Enter your offer");
return;
}

let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}
</script>

<footer>
DivinityPro — Premium Domains Marketplace
</footer>

</body>
</html>
