<script>

let allDomains = [];

fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv')
.then(res => res.text())
.then(text => {
    let rows = text.split("\n").slice(1);

    allDomains = rows.map(row => {
        return {
            name: row.trim()
        };
    });

    showDomains(allDomains);
});

function showDomains(domains) {
    let container = document.getElementById('domains');
    container.innerHTML = '';

    domains.forEach(d => {
        container.innerHTML += `
        <div class="card">
            <div class="domain">${d.name}</div>
            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${d.name}" target="_blank">
                <button>Check & Buy</button>
            </a>
        </div>
        `;
    });
}

</script>
