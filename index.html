<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
padding:18px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
flex-wrap:wrap;
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#8a2eff,#00f0ff);
-webkit-background-clip:text;
color:transparent;
animation:glowMove 5s linear infinite;
}

@keyframes glowMove{
0%{background-position:0%}
100%{background-position:200%}
}

.contact{
font-size:14px;
opacity:.9;
}

/* SLIDER الصور */
.slider{
position:relative;
height:340px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
background-size:cover;
background-position:center;
}

.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.4),#000);
top:0;
left:0;
}

.slide-content{
position:relative;
z-index:2;
}

.slide.active{opacity:1;}

.slide h1{
font-size:34px;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px rgba(0,240,255,.4);
}

.slide p{opacity:.8;}

.dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:12px;
height:12px;
background:#444;
border-radius:50%;
cursor:pointer;
transition:.3s;
}

.dot.active{
background:#00f0ff;
box-shadow:0 0 10px #00f0ff;
}

/* SLIDER دومينات صغير */
.domain-slider{
width:100%;
overflow:hidden;
padding:15px 0;
background:linear-gradient(270deg,#020617,#071a52,#14003b,#001f3f,#020617);
background-size:600% 600%;
animation:gradientMove 18s ease infinite;
border-top:1px solid rgba(0,240,255,.2);
border-bottom:1px solid rgba(138,46,255,.2);
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.slider-track{
display:flex;
gap:15px;
width:max-content;
animation:scrollDomains 55s linear infinite;
}

.domain-slider:hover .slider-track{
animation-play-state:paused;
}

@keyframes scrollDomains{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

.domain-box{
min-width:170px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
transition:.3s;
}

.domain-box:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 0 18px rgba(0,240,255,.45);
}

.domain-name{
font-size:14px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:130px;
}

/* DOMAINS GRID */
#domains{
width:90%;
margin:50px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.35s;
backdrop-filter:blur(10px);
position:relative;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:0 0 25px rgba(0,240,255,.3);
}

/* VIEWER COUNTER */
.viewer-counter{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,0.4);
padding:4px 10px;
border-radius:8px;
font-size:12px;
}

/* LANDING */
.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:clamp(28px,8vw,50px);
word-break:break-word;
line-height:1.2;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

.actions{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

input{
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.btn{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

.back{
margin-top:20px;
cursor:pointer;
opacity:.8;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.8);
padding:15px 20px;
border-radius:12px;
font-size:14px;
display:none;
border:1px solid rgba(0,240,255,0.3);
box-shadow:0 0 15px rgba(0,240,255,0.2);
}

.buy-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:25px;
border-radius:15px;
display:none;
width:300px;
text-align:center;
border:2px solid #00f0ff;
}

.buy-popup input{
width:80%;
margin-bottom:10px;
}

.buy-popup .btn{
width:80%;
}

footer{
text-align:center;
padding:25px;
opacity:.7;
border-top:1px solid rgba(255,255,255,.1);
}

</style>
</head>
<body>

<header>
<div class="logo">DivinityPro</div>
<div class="contact">📧 contact@divinitypro.com | 📞 +218 916 073 973</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<div class="buy-popup" id="buyPopup">
<h3 id="buyDomain"></h3>
<input id="offerInput" placeholder="Enter your offer $" />
<button class="btn offer" onclick="sendPopupOffer()">Send Offer</button>
<br><br>
<button class="btn back" onclick="closeBuyPopup()">Close</button>
</div>

<script>
const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';
const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];
let viewerCounts={};

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
domainsList=text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r!=="" && r.toLowerCase()!=="name");

domainsList.forEach(d=>viewerCounts[d]=Math.floor(Math.random()*10)+5);

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domainsList);
fakeActivity(domainsList);
}
});

function showHomepage(domains){
let html=`

<div class="slider">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<div class="slide-content">
<h1>Elite Domain Market</h1>
<p>Luxury digital assets for serious investors</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<div class="slide-content">
<h1>High Value Domains</h1>
<p>Secure deals via GoDaddy</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518779578993-ec3579fee39f')">
<div class="slide-content">
<h1>Domainer Empire</h1>
<p>Own the internet</p>
</div>
</div>

<div class="dots"></div>
</div>

<div class="domain-slider"><div class="slider-track">`;
domains.concat(domains).forEach(d=>{
html+=`<div class="domain-box" onclick="openBuyPopup('${d}')"><span class="domain-name">${d}</span></div>`;
});
html+=`</div></div>`;

html+=`<div id="domains">`;
domains.forEach(d=>{
html+=`<div class="card" onclick="openBuyPopup('${d}')">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});
html+=`</div>`;

document.getElementById('app').innerHTML=html;
initSlider();
}

function showLanding(domain){
document.getElementById('app').innerHTML=`<div class="landing">
<div class="big-domain">${domain}</div>
<div class="actions">
<input id="offerPrice" placeholder="Enter offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>
<div class="back" onclick="window.location='/'">← Back</div>
</div>`;
}

function openBuyPopup(domain){
document.getElementById('buyDomain').innerText=domain;
document.getElementById('buyPopup').style.display='block';
document.getElementById('offerInput').value='';
}

function closeBuyPopup(){
document.getElementById('buyPopup').style.display='none';
}

function sendPopupOffer(){
let domain=document.getElementById('buyDomain').innerText;
let price=document.getElementById('offerInput').value;
if(!price){alert("Enter your offer"); return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
closeBuyPopup();
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
let msg=`Hello, I want ${domain}%0AOffer: $${price}`;
window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');
let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');
dot.onclick=()=>{index=i;showSlide(index);};
dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));
slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);
}

function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
viewerCounts[d]=viewerCounts[d]+Math.floor(Math.random()*3);
let popup=document.getElementById('popup');
popup.innerText=`Someone made offer on ${d}`;
popup.style.display='block';
setTimeout(()=>{popup.style.display='none';},3000);
document.querySelectorAll('.card').forEach(c=>{
let name=c.querySelector('.domain').innerText;
if(name===d){
c.querySelector('.viewer-counter').innerText=`🔥 ${viewerCounts[d]} viewers`;
}
});
},5000);
}
</script>

<footer>
© 2026 DivinityPro — All Rights Reserved
</footer>

</body>
</html>
