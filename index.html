<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#1a1200,#000);
color:white;
overflow-x:hidden;
padding-bottom:120px;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
justify-content:flex-start;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,215,0,0.2);
}
.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#ffd700,#ffb700,#ffdd55);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 8px #ffd700, 0 0 20px #ffdd55;
animation:shineLogo 3s infinite linear;
}
@keyframes shineLogo{
0%,100%{background-position:0% 50%;}
50%{background-position:100% 50%;}
}

/* SLIDER */
.slider{
position:relative;
height:320px;
overflow:hidden;
margin:20px;
border-radius:18px;
box-shadow:0 0 30px #ffd700aa inset;
}
.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
border-radius:18px;
animation:shineSlide 10s infinite alternate;
}
.slide.active{opacity:1;}
.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.3),#000);
border-radius:18px;
}
@keyframes shineSlide{
0%,100%{filter:brightness(1);}
50%{filter:brightness(1.2);}
}

/* DOMAIN SCROLL */
.domain-slider{
width:90%;
margin:20px auto;
overflow:hidden;
border-radius:30px;
border:1px solid rgba(255,215,0,0.3);
box-shadow:0 0 15px #ffd700aa;
}
.domain-track{
display:flex;
gap:15px;
animation:scroll 25s linear infinite;
}
.domain-bubble{
padding:8px 16px;
background:linear-gradient(135deg,#ffd700,#ffb700,#ffe066);
border-radius:20px;
cursor:pointer;
white-space:nowrap;
color:#1a1200;
font-weight:500;
box-shadow:0 0 10px #ffd700;
transition:.5s;
}
.domain-bubble:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ffd700ff;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
#domains{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}
.card{
background:rgba(255,215,0,0.05);
padding:20px;
border-radius:15px;
cursor:pointer;
text-align:center;
transition:.3s;
box-shadow:0 0 10px #ffd70044;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ffd70088;
}

.domain{
background:linear-gradient(90deg,#ffd700,#ffb700);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 6px #ffd700,0 0 15px #ffdd55;
animation:shineText 2.5s infinite alternate;
}
@keyframes shineText{
0%{text-shadow:0 0 6px #ffd700,0 0 15px #ffdd55;}
50%{text-shadow:0 0 10px #ffd700,0 0 25px #ffdd55;}
100%{text-shadow:0 0 6px #ffd700,0 0 15px #ffdd55;}
}

/* LANDING */
.landing{
text-align:center;
padding:50px 20px;
}
.big-domain{
font-size:40px;
background:linear-gradient(90deg,#ffd700,#ffb700);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 10px #ffd700,0 0 25px #ffdd55;
animation:shineText 2.5s infinite alternate;
}

.btn{
padding:10px 18px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
font-weight:500;
box-shadow:0 0 8px #ffd70066;
transition:.3s;
}
.buy{background:#ffd700;color:#1a1200;}
.offer{background:#ffb700;color:#1a1200;}
.whatsapp{background:#ffdd55;color:#1a1200;}
.btn:hover{transform:scale(1.05);box-shadow:0 0 20px #ffd700;}

/* FLOAT WHATSAPP */
.float-wa{
position:fixed;
bottom:90px;
right:20px;
width:60px;
height:60px;
background:#ffd700;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:26px;
color:#1a1200;
box-shadow:0 0 15px #ffd700aa;
transition:.3s;
}
.float-wa:hover{
transform:scale(1.1);
box-shadow:0 0 30px #ffd700ff;
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(-45deg,#ffd700,#ffb700,#ffe066,#ffd700);
background-size:400% 400%;
animation:grad 10s ease infinite;
padding:10px;
text-align:center;
font-size:12px;
color:#1a1200;
text-shadow:0 0 5px #ffd700;
}
@keyframes grad{
0%{background-position:0%}
100%{background-position:400%}
}

</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app">Loading...</div>

<div class="float-wa" onclick="window.open('https://wa.me/218916073973')">
<i class="fab fa-whatsapp"></i>
</div>

<footer>
contact@divinitypro.com | +218 916 073 973
</footer>

<script>

const BASE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv";

let domains=[];

function loadDomains(){

fetch(BASE_URL + "&t=" + Date.now(), {cache:"no-store"})
.then(res=>res.text())
.then(text=>{

domains=text.split(/\n/)
.map(x=>x.trim())
.filter(x=>x && x.toLowerCase()!=="name");

const params=new URLSearchParams(window.location.search);
const d=params.get("domain");

if(d){
showLanding(d);
}else{
showHome();
}

});

}

function showHome(){

let html=`

<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')"></div>
</div>

<div class="domain-slider">
<div class="domain-track">
`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="go('${d}')">${d}</div>`;
});

html+=`</div></div><div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="go('${d}')">
<div class="domain">${d}</div>
</div>
`;
});

html+=`</div>`;

document.getElementById("app").innerHTML=html;

initSlider();
}

function showLanding(d){
document.getElementById("app").innerHTML=`
<div class="landing">
<div class="big-domain">${d}</div>

<input id="price" placeholder="Offer $" />

<br>

<button class="btn offer" onclick="offer('${d}')">Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${d}')">Buy</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/218916073973?text=I want ${d}')">WhatsApp</button>

<br><br>
<button onclick="goHome()">Back</button>
</div>
`;
}

function go(d){
history.pushState({}, "", "?domain="+d);
loadDomains();
}

function goHome(){
history.pushState({}, "", "/");
loadDomains();
}

function offer(d){
let p=document.getElementById("price").value;
if(!p){alert("Enter price");return;}
window.open(`https://wa.me/218916073973?text=Offer ${d} $${p}`);
}

function initSlider(){
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);
}

// init
loadDomains();
setInterval(loadDomains,20000);

</script>

</body>
</html>
