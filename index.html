<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#000;
color:white;
padding-bottom:120px;
}

/* HEADER */
header{
padding:15px;
background:#000;
border-bottom:1px solid #222;
}
.logo{font-size:22px;font-weight:bold;}

/* DOMAINS */
#domains{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}
.card{
background:#111;
padding:20px;
border-radius:12px;
cursor:pointer;
}
.card:hover{background:#1a1a1a;}

.domain{font-size:16px;}

/* LANDING */
.landing{
text-align:center;
padding:50px 20px;
}
.big-domain{font-size:35px;margin-bottom:20px;}

.btn{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}
.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app">Loading...</div>

<footer>
<div>contact@divinitypro.com</div>
<div>+218 916 073 973</div>
</footer>

<script>

const BASE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv";

const WHATSAPP="218916073973";

function getDomains(){
return fetch(BASE_URL + "&t=" + Date.now(), {
method:"GET",
headers:{
"Cache-Control":"no-cache"
}
})
.then(res=>res.text())
.then(text=>{
return text.split(/\n/)
.map(x=>x.trim())
.filter(x=>x && x.toLowerCase()!=="name");
});
}

function renderHome(domains){
let html=`<div id="domains">`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="openDomain('${d}')">
<div class="domain">${d}</div>
</div>`;
});

html+=`</div>`;
document.getElementById("app").innerHTML=html;
}

function renderDomain(domain){
document.getElementById("app").innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>

<input id="price" placeholder="Offer $" />

<br>

<button class="btn offer" onclick="offer('${domain}')">Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>

<br><br>
<button onclick="goHome()">Back</button>
</div>
`;
}

function openDomain(d){
history.pushState({}, "", "?domain="+d);
renderDomain(d);
}

function goHome(){
history.pushState({}, "", "/");
load();
}

function offer(domain){
let p=document.getElementById("price").value;
if(!p){alert("Enter price");return;}
window.open(`https://wa.me/${WHATSAPP}?text=Offer ${domain} $${p}`);
}

function load(){
getDomains().then(domains=>{
const params=new URLSearchParams(window.location.search);
const d=params.get("domain");

if(d){
renderDomain(d);
}else{
renderHome(domains);
}
});
}

// تشغيل
load();

// تحديث تلقائي
setInterval(load,15000);

</script>

</body>
</html>
