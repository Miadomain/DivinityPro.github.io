<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}
.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

/* SLIDER */
.slider{
position:relative;
height:320px;
overflow:hidden;
margin:20px auto;
border-radius:18px;
}
.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
background-size:cover;
}
.slide.active{opacity:1;}
.slide h1{
font-size:32px;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
-webkit-background-clip:text;
color:transparent;
}

/* DOMAIN SLIDER */
.domain-slider{
width:90%;
margin:20px auto;
overflow:hidden;
height:50px;
}
.domain-track{
display:flex;
gap:15px;
animation:move 25s linear infinite;
}
.domain-bubble{
padding:8px 18px;
border-radius:50px;
background:linear-gradient(135deg,#ff6ec4,#7873f5,#00ffff);
cursor:pointer;
white-space:nowrap;
}
@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
#domains{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.3s;
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00ffff;
}
.domain{
font-size:18px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}

/* LANDING */
.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
}
.big-domain{
font-size:clamp(28px,8vw,50px);
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
.actions{margin-top:20px;}
.btn{
padding:10px 20px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
}
.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:#000;
padding:10px 15px;
border-radius:10px;
display:none;
}

/* FLOAT WHATSAPP */
.floating-whatsapp{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<div class="floating-whatsapp" onclick="window.open('https://wa.me/218916073973')">
<i class="fab fa-whatsapp"></i>
</div>

<script>

// 🔥 حل مشكلة التحديث
const BASE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSitqWwfiqP8hkEmrwOhJbg0gBj3LUgp_Iqa8WHWLUCjY0455r4mZv-KVd5oFIyWZ-3sOMdwACQwnVT/pub?output=csv";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];

function fetchDomains(){
return fetch(BASE_URL+"&t="+Date.now(),{cache:"no-store"})
.then(res=>res.text())
.then(text=>{
return text.split(/\r?\n/)
.map(d=>d.trim())
.filter(d=>d && d.toLowerCase()!=="name");
});
}

function showHomepage(domains){

let html=`

<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<h1>Premium Domains</h1></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<h1>Secure Deals</h1></div>
</div>

<div class="domain-slider"><div class="domain-track">
`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="window.location='?domain=${d}'">${d}</div>`;
});

html+=`</div></div><div id="domains">`;

domains.forEach(d=>{
html+=`<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+=`</div>`;
document.getElementById("app").innerHTML=html;

initSlider();
fakeActivity(domains);
}

function showLanding(domain){
document.getElementById("app").innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>

<div class="actions">
<input id="offerPrice" placeholder="Offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/218916073973?text=I want ${domain}')">Chat</button>
</div>

<div onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter price");return;}
window.open(`https://wa.me/218916073973?text=Offer for ${domain} $${price}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},4000);
}

function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
let p=document.getElementById("popup");
p.innerText="New offer on "+d;
p.style.display="block";
setTimeout(()=>p.style.display="none",3000);
},5000);
}

// تشغيل
function load(){
fetchDomains().then(d=>{
domainsList=d;
if(selectedDomain) showLanding(selectedDomain);
else showHomepage(domainsList);
});
}

load();

// 🔄 تحديث تلقائي
setInterval(load,20000);

</script>

</body>
</html>
