<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
padding:18px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#8a2eff,#00f0ff);
-webkit-background-clip:text;
color:transparent;
animation:glowMove 5s linear infinite;
}

@keyframes glowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* ================= SLIDER HERO ================= */

.slider{
position:relative;
height:340px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
background-size:cover;
background-position:center;
}

.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.4),#000);
top:0;
left:0;
}

.slide-content{position:relative;z-index:2;}
.slide.active{opacity:1;}

.slide h1{
font-size:34px;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

.dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:12px;
height:12px;
background:#444;
border-radius:50%;
cursor:pointer;
}

.dot.active{
background:#00f0ff;
box-shadow:0 0 10px #00f0ff;
}

/* ================= DOMAIN RECTANGLE SLIDER ================= */

.domain-slider{
width:100%;
overflow:hidden;
padding:35px 0;
background:linear-gradient(90deg,#020617,#050b25);
border-top:1px solid rgba(255,255,255,.05);
border-bottom:1px solid rgba(255,255,255,.05);
}

.domain-track{
display:flex;
gap:20px;
width:max-content;
animation:scrollDomains 30s linear infinite;
}

.domain-slider:hover .domain-track{
animation-play-state:paused;
}

.domain-box{
min-width:240px;
height:80px;
display:flex;
align-items:center;
gap:15px;
padding:0 20px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
cursor:pointer;
transition:.3s;
}

.domain-box:hover{
transform:scale(1.05);
border:1px solid #00f0ff;
box-shadow:0 0 20px rgba(0,240,255,.4);
}

.domain-icon{
font-size:22px;
color:#00f0ff;
}

.domain-name{
font-weight:600;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

@keyframes scrollDomains{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* ================= GRID ================= */

#domains{
width:90%;
margin:50px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.35s;
}

.card:hover{
transform:translateY(-12px);
box-shadow:0 0 25px rgba(0,240,255,.3);
}

.domain{
font-size:20px;
font-weight:600;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

/* LANDING */
.landing{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
flex-direction:column;
text-align:center;
}

.big-domain{
font-size:50px;
background:linear-gradient(90deg,#00f0ff,#8a2eff);
-webkit-background-clip:text;
color:transparent;
}

.actions{margin-top:25px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

input{
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.btn{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

.about{
padding:60px 10%;
background:#050505;
text-align:center;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.8);
padding:15px 20px;
border-radius:12px;
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<script>

const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';
const WHATSAPP="218916073973";

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
let domains=text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r!=="" && r.toLowerCase()!=="name");

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domains);
fakeActivity(domains);
}
});

function showHomepage(domains){

let html=`

<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<div class="slide-content">
<h1>Elite Domain Market</h1>
<p>Luxury digital assets</p>
</div>
</div>
<div class="dots"></div>
</div>

<!-- RECTANGLE DOMAIN SLIDER -->
<div class="domain-slider">
<div class="domain-track">
`;

domains.concat(domains).forEach(d=>{
html+=`
<div class="domain-box" onclick="window.location='?domain=${d}'">
<i class="fa-solid fa-globe domain-icon"></i>
<div class="domain-name">${d}</div>
</div>`;
});

html+=`
</div>
</div>

<div id="domains">
`;

domains.forEach(d=>{
html+=`
<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
</div>`;
});

html+=`
</div>

<div class="about">
<h2>About DivinityPro</h2>
<p>Premium domain investment marketplace.</p>
</div>
`;

document.getElementById('app').innerHTML=html;
initSlider();
}

function showLanding(domain){
document.getElementById('app').innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>

<div class="actions">
<input id="offerPrice" placeholder="Enter offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Make Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy Now</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/${WHATSAPP}?text=I want ${domain}')">Chat</button>
</div>

<div style="margin-top:25px;cursor:pointer" onclick="window.location='/'">← Back</div>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter your offer");return;}
window.open(`https://wa.me/${WHATSAPP}?text=Offer ${domain} $${price}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
const dotsContainer=document.querySelector('.dots');
let index=0;

slides.forEach((_,i)=>{
let dot=document.createElement('div');
dot.classList.add('dot');
if(i===0) dot.classList.add('active');
dot.onclick=()=>showSlide(index=i);
dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll('.dot');

function showSlide(i){
slides.forEach(s=>s.classList.remove('active'));
dots.forEach(d=>d.classList.remove('active'));
slides[i].classList.add('active');
dots[i].classList.add('active');
}

setInterval(()=>{
index=(index+1)%slides.length;
showSlide(index);
},4000);
}

function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
let popup=document.getElementById('popup');
popup.innerText=`Someone made offer on ${d}`;
popup.style.display='block';
setTimeout(()=>popup.style.display='none',3000);
},5000);
}

</script>

</body>
</html>
