<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivinityPro - Elite Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#0a0f2c,#000);
color:white;
overflow-x:hidden;
padding-bottom:100px;
}

/* HEADER */
header{
padding:15px 6%;
display:flex;
justify-content:flex-start;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:relative;
z-index:999;
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
animation:glowMove 5s linear infinite;
}

@keyframes glowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* BODY CONTAINER */
#app{padding-top:20px;}

/* SLIDER */
.slider{
position:relative;
height:340px;
overflow:hidden;
margin:20px auto;
border-radius:18px;
}
.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:1s;
padding:20px;
background-size:cover;
background-position:center;
border-radius:18px;
}
.slide::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,.4),#000);
top:0;
left:0;
border-radius:18px;
}
.slide-content{position:relative;z-index:2;}
.slide.active{opacity:1;}
.slide h1{
font-size:34px;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
-webkit-background-clip:text;
color:transparent;
}
.dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}
.dot{
width:12px;height:12px;background:#444;border-radius:50%;cursor:pointer;
}
.dot.active{background:#00f0ff;}

/* DOMAIN SLIDER */
.domain-slider{
width:90%;
margin:20px auto;
overflow:hidden;
height:50px;
border-radius:25px;
border:2px solid rgba(255,255,255,0.1);
}
.domain-track{
display:flex;
gap:15px;
animation:slideDomains 30s linear infinite;
}
.domain-bubble{
padding:8px 18px;
border-radius:50px;
background:linear-gradient(135deg,#ff6ec4,#7873f5,#00ffff);
cursor:pointer;
white-space:nowrap;
}
@keyframes slideDomains{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
#domains{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
}
.domain{
font-size:18px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
.viewer-counter{font-size:12px;}

/* LANDING */
.landing{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
}
.big-domain{
font-size:40px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
}
.btn{padding:10px 20px;border:none;border-radius:10px;margin:5px;cursor:pointer;}
.buy{background:#00e676;color:black;}
.offer{background:#ffb300;color:black;}
.whatsapp{background:#25D366;color:white;}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:#000;
padding:10px 15px;
border-radius:10px;
display:none;
}

/* FLOAT WHATSAPP */
.floating-whatsapp{
position:fixed;
bottom:100px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">DivinityPro</div>
</header>

<div id="app"></div>
<div class="popup" id="popup"></div>

<div class="floating-whatsapp" onclick="window.open('https://wa.me/218916073973')">
<i class="fab fa-whatsapp"></i>
</div>

<script>

// 🔥 رابط Google مع حل الكاش
const BASE_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv';

const params=new URLSearchParams(window.location.search);
const selectedDomain=params.get("domain");

let domainsList=[];
let viewerCounts={};

function loadDomains(){

fetch(BASE_URL + "&t=" + Date.now(), {cache:"no-store"})
.then(res=>res.text())
.then(text=>{

domainsList=text.split(/\r?\n/)
.map(r=>r.trim())
.filter(r=>r!=="" && r.toLowerCase()!=="name");

viewerCounts={};
domainsList.forEach(d=>viewerCounts[d]=Math.floor(Math.random()*10)+5);

if(selectedDomain){
showLanding(selectedDomain);
}else{
showHomepage(domainsList);
fakeActivity(domainsList);
}

});

}

function showHomepage(domains){
let html=`
<div class="slider">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72')">
<div class="slide-content"><h1>DivinityPro</h1></div></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<div class="slide-content"><h1>High Value Domains</h1></div></div>
<div class="dots"></div>
</div>

<div class="domain-slider"><div class="domain-track">`;

domains.forEach(d=>{
html+=`<div class="domain-bubble" onclick="window.location='?domain=${d}'">${d}</div>`;
});

html+=`</div></div><div id="domains">`;

domains.forEach(d=>{
html+=`<div class="card" onclick="window.location='?domain=${d}'">
<div class="domain">${d}</div>
<div class="viewer-counter">🔥 ${viewerCounts[d]} viewers</div>
</div>`;
});

html+=`</div>`;
document.getElementById('app').innerHTML=html;
initSlider();
}

function showLanding(domain){
document.getElementById('app').innerHTML=`
<div class="landing">
<div class="big-domain">${domain}</div>
<input id="offerPrice" placeholder="Offer $" />
<button class="btn offer" onclick="sendOffer('${domain}')">Offer</button>
<button class="btn buy" onclick="window.open('https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}')">Buy</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/218916073973?text=I want ${domain}')">Chat</button>
</div>`;
}

function sendOffer(domain){
let price=document.getElementById('offerPrice').value;
if(!price){alert("Enter price");return;}
window.open(`https://wa.me/218916073973?text=Offer ${domain} $${price}`);
}

function initSlider(){
const slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},4000);
}

function fakeActivity(domains){
setInterval(()=>{
let d=domains[Math.floor(Math.random()*domains.length)];
let p=document.getElementById("popup");
p.innerText="New offer on "+d;
p.style.display="block";
setTimeout(()=>p.style.display="none",3000);
},5000);
}

// تشغيل
loadDomains();

// 🔄 تحديث تلقائي
setInterval(loadDomains,20000);

</script>

</body>
</html>
