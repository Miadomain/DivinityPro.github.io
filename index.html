<script>

let allDomains = [];

fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLTWddJjWfI0WG0HZp4uOmxobQ6Tfzw4WiheRdAiwkh0ywEdDma7MQSznkp9FCSCcRLfTT0KTbyfw/pub?output=csv')
.then(res => res.text())
.then(text => {

    let rows = text.split("\n");

    allDomains = rows
        .map(row => row.trim())
        .filter(row => row !== "" && row !== "name"); // حذف الفارغ والعنوان

    showDomains(allDomains);
});

function showDomains(domains) {
    let container = document.getElementById('domains');
    container.innerHTML = '';

    domains.forEach(domain => {
        container.innerHTML += `
        <div class="card">
            <div class="domain">${domain}</div>
            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${domain}" target="_blank">
                <button>Check & Buy</button>
            </a>
        </div>
        `;
    });
}

</script>
